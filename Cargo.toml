[workspace]
resolver = "3"
members = ["commands", "flags", "metadata", "settings", "statebox", "utils"]

[workspace.dependencies]
commands = { path = "./commands" }
debian-control = "0.2.0"
fancy-regex = "0.16.2"
flags = { path = "./flags" }
metadata = { path = "./metadata" }
nix = { version = "0.30.1", features = ["user"] }
reqwest = "0.12.24"
settings = { path = "./settings" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
serde_norway = "0.9.42"
statebox = { path = "./statebox" }
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }
utils = { path = "./utils" }

[package]
name = "pax"
version = "0.1.1"
edition = "2024"

[dependencies]
commands.workspace = true
debian-control.workspace = true
flags.workspace = true
metadata.workspace = true
reqwest.workspace = true
settings.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_norway.workspace = true
statebox.workspace = true
tokio.workspace = true
utils.workspace = true

# [env]
# You can find some static variables in .cargo/config.toml
